spring.application.name=marketreply-ai

# ---- MongoDB Atlas ----
# Replace <user>, <password>, <cluster-url> and database name with your Atlas values.
spring.data.mongodb.uri=mongodb+srv://<user>:<password>@<cluster-url>/marketreply?retryWrites=true&w=majority

# ---- Gemini ----
gemini.api-key=${GEMINI_API_KEY:your-gemini-api-key-here}
gemini.model=gemini-2.5-flash
gemini.base-url=https://generativelanguage.googleapis.com/v1beta

# ---- JWT (login/register auth) ----
# IMPORTANT: override jwt.secret via the JWT_SECRET env var in any shared/production deployment.
jwt.secret=${JWT_SECRET:change-this-default-dev-only-secret-key-please-32chars-min}
jwt.expiration-ms=604800000

# ---- Server ----
server.port=8080

# ---- Optional API key gate (see security/ApiKeyFilter.java) ----
security.api-key.enabled=false
security.api-key.value=
security.api-key.header=X-API-KEY

# ---- Swagger ----
springdoc.swagger-ui.path=/swagger-ui.html

# Active profile (dev by default)
spring.profiles.active=dev
